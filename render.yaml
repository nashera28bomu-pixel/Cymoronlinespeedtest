services:
  - type: web
    name: cymortune
    runtime: node
    plan: free
    # Remove --user, just install it directly
    buildCommand: npm install && pip3 install -U yt-dlp
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Just use 'yt-dlp' as the command; the environment will find it automatically
      - key: YTDLP_PATH
        value: yt-dlp
