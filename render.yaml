services:
  - type: web
    name: cymortune
    runtime: node
    plan: free
    # 1. Update npm packages
    # 2. Install FFmpeg (using apt-get, which is available in Render's environment)
    # 3. Install the 'default' yt-dlp extras (includes JS solvers for YouTube challenges)
    buildCommand: |
      npm install && \
      apt-get update && apt-get install -y ffmpeg && \
      pip3 install -U "yt-dlp[default]"
      
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # This points to the binary installed via pip
      - key: YTDLP_PATH
        value: /usr/local/bin/yt-dlp
