services:
  - type: web
    name: cymortune
    runtime: node
    plan: free
    buildCommand: npm install && pip3 install -U yt-dlp || pip install -U yt-dlp
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
