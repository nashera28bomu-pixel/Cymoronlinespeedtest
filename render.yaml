services:
  - type: web
    name: cymortune
    runtime: node
    plan: free
    # Updated buildCommand to handle the environment restriction
    buildCommand: >-
      npm install && 
      apt-get update && apt-get install -y ffmpeg && 
      pip3 install -U yt-dlp --break-system-packages
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: YTDLP_PATH
        value: /usr/local/bin/yt-dlp
