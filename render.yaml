services:
  - type: web
    name: cymortune
    runtime: node
    plan: free
    # No more pip, no more virtual environments
    buildCommand: >-
      npm install && 
      apt-get update && apt-get install -y ffmpeg
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Point to the local node_modules version
      - key: YTDLP_PATH
        value: ./node_modules/yt-dlp/bin/yt-dlp
