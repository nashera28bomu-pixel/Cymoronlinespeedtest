services:
  - type: web
    name: cymortune
    runtime: node
    plan: free
    # Installs yt-dlp into the local project directory
    buildCommand: npm install && pip3 install --user -U yt-dlp
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Points directly to the user-installed binary path
      - key: YTDLP_PATH
        value: /opt/render/project/src/.local/bin/yt-dlp
