services:
  - type: web
    name: cymortune
    runtime: node
    plan: free
    buildCommand: >-
      npm install && 
      apt-get update && apt-get install -y ffmpeg python3-venv && 
      python3 -m venv venv && 
      ./venv/bin/pip install -U yt-dlp && 
      cp ./venv/bin/yt-dlp ./yt-dlp-bin
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: YTDLP_PATH
        value: ./yt-dlp-bin
